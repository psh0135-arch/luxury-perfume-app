name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build (with repo name as base path)
        env:
          # GitHub Pages serves project sites at /<repo>/, so set Vite base accordingly
          VITE_BASE: /${{ github.event.repository.name }}/
        run: bun run build

      - name: SPA fallback (copy index.html to 404.html if missing)
        run: |
          if [ ! -f dist/404.html ]; then cp dist/index.html dist/404.html; fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
